services:
  - type: web
    name: autods-ai-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: '["https://frontend-blush-nine-81.vercel.app"]'
      - key: DATA_DIR
        value: /app/data
      - key: GOOGLE_API_KEY
        sync: false
      - key: APP_ACCESS_PASSWORD
        value: ""
