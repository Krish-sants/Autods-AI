apiVersion: v1
kind: ConfigMap
metadata:
  name: autods-config
  namespace: autods-ai
data:
  CORS_ORIGINS: '["https://your-domain.com"]'
  LLM_PROVIDER: "gemini"
  GEMINI_MODEL: "gemini-2.5-flash"
  CV_FOLDS: "5"
  OPTUNA_N_TRIALS: "30"
  OPTUNA_TIMEOUT_S: "180"
  SHAP_SAMPLE_SIZE: "200"
  FORECAST_PERIODS: "30"
  ARTIFACT_RETENTION_DAYS: "30"
  MAX_UPLOAD_MB: "200"
  # Frontend
  NEXT_PUBLIC_API_BASE_URL: "https://your-domain.com/api/v1"
