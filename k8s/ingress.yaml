# Requires nginx ingress controller: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autods-ingress
  namespace: autods-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "210m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: autods-backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: autods-backend
                port:
                  number: 8000
          - path: /predict
            pathType: Prefix
            backend:
              service:
                name: autods-predictor
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autods-frontend
                port:
                  number: 3000
